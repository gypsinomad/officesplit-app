name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/officesplit.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias officesplit \
            -storepass officesplit123 \
            -keypass officesplit123 \
            -dname "CN=OfficeSplit,OU=Dev,O=Gypsinomad,L=Kozhikode,ST=Kerala,C=IN"
          ls -la android/app/officesplit.jks

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build signed APK
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/android/app/officesplit.jks \
            -Pandroid.injected.signing.store.password=officesplit123 \
            -Pandroid.injected.signing.key.alias=officesplit \
            -Pandroid.injected.signing.key.password=officesplit123

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: officesplit-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
